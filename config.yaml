df_id: DF-HLM-7
df_name: rho-forecast-updater
version: 0.1.0
status: READY-MOCK-DEFAULT
description: "HeyLou-Marketing-Wave-2 rho Forecast Updater with deterministic Monte-Carlo forecasting."

k11_cascade_containment:
  failure_blast_radius: 0
  dependency_dlq_separate: true

k12_distillation_resistenz:
  provenance_required_in_output: true
  provenance_fields:
    - iteration_count
    - seed
    - variable_priors
  non_llm_validation_layer: true

k13_independent_ground_truth:
  external_anchor_type: sales_cloud_revenue_data
  pre_action_domain_check: true

k14_human_override_decay:
  override_complexity: single_command
  martin_review_cadence: quarterly

k15_entropy_budget:
  entropy_added_loc_estimate: 400
  entropy_justified_by_rho: "EUR 50-75k/Jahr Forecast-Accuracy + Strategic-Decision-Quality"

k16_concurrent_spawn_mutex:
  lock_dir: /tmp/df-hlm-7.lock
  engine_pgrep_check: true

lose_coupling:
  LC1_graceful_degradation:
    modes:
      - full
      - degraded_partial_inputs
      - degraded_no_sales_data
      - standalone_prior_only
  LC2_direct_mode_fallback:
    capability: 0.60
    trigger: ">=1 DF-HLM-x Input unreachable >30s"
  LC3_circuit_breaker:
    timeout_s: 30
    open_threshold: 3
  LC4_failure_isolation:
    state_externalization: true
    monthly_snapshots: true
    idempotent: true
  LC5_health_check_independence:
    health_check_dependencies: []

env_var_gating:
  default_mode: mock
  real_sales_cloud_enabled:
    name: DF_HLM_7_REAL_SALES_CLOUD_ENABLED
    required_value: "true"
    required_for_real_mode: true
  phronesis_ticket:
    name: PHRONESIS_TICKET
    pattern: "^PT-2026-[A-Z0-9]{2}-[A-Z0-9]{3}$"
    required_for_real_mode: true

forecast:
  iterations: 1000
  seed: 20260514
  months: 3
  priors:
    invest:
      distribution: uniform
      low_eur: 25000
      high_eur: 50000
    roi:
      distribution: beta
      alpha: 3
      beta: 7
    lift:
      distribution: normal
      mean: 2.0
      std: 0.3
    voice:
      distribution: normal
      mean: 0.0
      std: 0.1

operations:
  state_dir: state
  reports_dir: reports
  audit_log_path: logs/df-hlm-7-audit.jsonl
  stop_flag_path: /tmp/df-hlm-7.stop
  health_file_path: /tmp/df-hlm-7-health.json
crux-mk: true
